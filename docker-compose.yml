services:
  backend:
    build: .
    container_name: banking-bot-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: .
    container_name: banking-bot-frontend
    env_file:
      - .env
    environment:
      BACKEND_BASE_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "8501:8501"
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
